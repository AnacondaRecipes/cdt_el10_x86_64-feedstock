package:
  name: cracklib-dicts-el10-x86_64
  version: 2.9.11

source:
  - url: https://download.rockylinux.org/vault/rocky/10.0/BaseOS/x86_64/os/Packages/c/cracklib-dicts-2.9.11-8.el10.x86_64.rpm
    sha256: 2b5356fc405cb6d6637d15c5548997e70098a00e646ec6de010c1f2aab206a22
    no_hoist: true
    folder: binary

build:
  skip: True  # [not (linux and x86_64)]
  number: {{ build_number }}
  noarch: generic
  binary_relocation: false
  detect_binary_files_with_prefix: false

requirements:
  host:
  run:
    - sysroot_linux-64 2.39.*
    - cracklib-el10-x86_64 ==2.9.11 *_{{ build_number }}

test:
  commands:
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib64/cracklib_dict.pwd

# The license isn't maintained in the code base but the original
# development site, https://sourceforge.net/projects/cracklib/,
# suggests LGPL-2.0
about:
  home: https://github.com/cracklib/cracklib
  license: LGPL-2.0-only  # LGPL-2.1-or-later
  license_family: LGPL
  license_file:
    - LGPL-2.0-only
  summary: (CDT) The standard CrackLib dictionaries
  description: |
    The cracklib-dicts package includes the CrackLib dictionaries.
    CrackLib will need to use the dictionary appropriate to your system,
    which is normally put in /usr/share/dict/words. Cracklib-dicts also
    contains the utilities necessary for the creation of new dictionaries.

    If you are installing CrackLib, you should also install cracklib-dicts.
  doc_url: https://github.com/cracklib/cracklib
  dev_url: https://github.com/cracklib/cracklib

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
