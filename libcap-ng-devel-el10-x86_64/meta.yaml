package:
  name: libcap-ng-devel-el10-x86_64
  version: 0.8.4

source:
  - url: https://download.rockylinux.org/vault/rocky/10.0/AppStream/x86_64/os/Packages/l/libcap-ng-devel-0.8.4-6.el10.x86_64.rpm
    sha256: f571fe0cd5167a8675e0bfb53bd41750c2d6f56d5aed4199d4b33ea21f438ea3
    no_hoist: true
    folder: binary

build:
  skip: True  # [not (linux and x86_64)]
  number: {{ build_number }}
  noarch: generic
  binary_relocation: false
  detect_binary_files_with_prefix: false

requirements:
  host:
  run:
    - sysroot_linux-64 2.39.*
    - libcap-ng-el10-x86_64 ==0.8.4 *_{{ build_number }}

test:
  commands:
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/include/cap-ng.h
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib64/libcap-ng.so

about:
  home: https://people.redhat.com/sgrubb/libcap-ng/
  license: LGPL-2.1-only  # LGPL-2.0-or-later
  license_family: LGPL
  license_file:
    - COPYING.LIB
  summary: (CDT) Header files for libcap-ng library
  description: |
    The libcap-ng-devel package contains the files needed for developing
    applications that need to use the libcap-ng library.
  doc_url: https://people.redhat.com/sgrubb/libcap-ng/
  dev_url: https://people.redhat.com/sgrubb/libcap-ng/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
