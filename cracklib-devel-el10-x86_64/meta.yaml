package:
  name: cracklib-devel-el10-x86_64
  version: 2.9.11

source:
  - url: https://download.rockylinux.org/vault/rocky/10.0/devel/x86_64/os/Packages/c/cracklib-devel-2.9.11-8.el10.x86_64.rpm
    sha256: 16718e067dc8a593e4bbfa96c28a2281fa3dfee61b0a9ec2a2d2e02fd2da17d0
    no_hoist: true
    folder: binary

build:
  skip: True  # [not (linux and x86_64)]
  number: {{ build_number }}
  noarch: generic
  binary_relocation: false
  detect_binary_files_with_prefix: false

requirements:
  host:
  run:
    - cracklib-el10-x86_64 ==2.9.11 *_{{ build_number }}

test:
  commands:
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/include/crack.h
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib64/libcrack.so

about:
  home: https://github.com/cracklib/cracklib
  license: LGPL-2.1-only  # LGPL-2.1-or-later
  license_family: LGPL
  license_file:
    - COPYING.LIB
  summary: (CDT) Development files needed for building applications which use cracklib
  description: |
    The cracklib-devel package contains the header files and libraries needed
    for compiling applications which use cracklib.
  doc_url: https://github.com/cracklib/cracklib
  dev_url: https://github.com/cracklib/cracklib

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
