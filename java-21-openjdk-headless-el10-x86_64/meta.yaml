package:
  name: java-21-openjdk-headless-el10-x86_64
  version: 21.0.9.0.10

source:
  - url: https://download.rockylinux.org/vault/rocky/10.0/AppStream/x86_64/os/Packages/j/java-21-openjdk-headless-21.0.9.0.10-1.el10.x86_64.rpm
    sha256: e170579e2b6ea58639d2b2e9cb15f944a3d12b80f4171bdf2c827670a8ab53e2
    no_hoist: true
    folder: binary

build:
  skip: True  # [not (linux and x86_64)]
  number: {{ build_number }}
  noarch: generic
  missing_dso_whitelist:
    - '*'

requirements:
  build:
    - sysroot_linux-64 2.39.*
  host:
    - javapackages-filesystem-el10-x86_64 >=6.4.0 *_{{ build_number }}
  run:
    - sysroot_linux-64 2.39.*
    - alsa-lib
    - ca-certificates
    - javapackages-filesystem-el10-x86_64 >=6.4.0 *_{{ build_number }}
    - nss

test:
  commands:
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib/jvm/java-21-openjdk/lib/libawt.so
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib/jvm/java-21-openjdk/lib/libjava.so

# The nominal license is https://github.com/openjdk/jdk/blob/master/LICENSE
about:
  home: http://openjdk.java.net/
  license: ASL 1.1 and ASL 2.0 and BSD and BSD with advertising and GPL+ and GPLv2 and GPLv2 with exceptions and IJG and LGPLv2+ and MIT and MPLv2.0 and Public Domain and W3C and zlib  # ASL 1.1 and ASL 2.0 and BSD and BSD with advertising and GPL+ and GPLv2 and GPLv2 with exceptions and IJG and LGPLv2+ and MIT and MPLv2.0 and Public Domain and W3C and zlib and ISC and FTL and RSA
  license_family: Other
  license_file:
    - ADDITIONAL_LICENSE_INFO
    - ASSEMBLY_EXCEPTION
    - LICENSE
    - aes.md
    - asm.md
    - bcel.md
    - c-libutl.md
    - cldr.md
    - colorimaging.md
    - dom.md
    - dynalink.md
    - freetype.md
    - giflib.md
    - harfbuzz.md
    - icu.md
    - jcup.md
    - jline.md
    - jopt-simple.md
    - jpeg.md
    - jquery.md
    - jqueryUI.md
    - lcms.md
    - libpng.md
    - mesa3d.md
    - pcsclite.md
    - pipewire.md
    - pkcs11cryptotoken.md
    - pkcs11wrapper.md
    - public_suffix.md
    - santuario.md
    - siphash.md
    - thaidict.md
    - unicode.md
    - xalan.md
    - xerces.md
    - xwd.md
    - zlib.md
  summary: (CDT) OpenJDK 21 Headless Runtime Environment
  description: |
    The OpenJDK 21 runtime environment without audio and video support.
  doc_url: http://openjdk.java.net/
  dev_url: http://openjdk.java.net/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
