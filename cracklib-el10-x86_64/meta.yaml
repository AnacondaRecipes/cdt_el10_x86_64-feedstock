package:
  name: cracklib-el10-x86_64
  version: 2.9.11

source:
  - url: https://download.rockylinux.org/vault/rocky/10.0/BaseOS/x86_64/os/Packages/c/cracklib-2.9.11-8.el10.x86_64.rpm
    sha256: dde81ec954f9893964555d586c05d47c3fa210fe26df9a3446119a8d8afdd7fd
    no_hoist: true
    folder: binary

build:
  skip: True  # [not (linux and x86_64)]
  number: {{ build_number }}
  noarch: generic
  binary_relocation: false
  detect_binary_files_with_prefix: false
  missing_dso_whitelist:
    - '*'

requirements:
  build:
    - sysroot_linux-64 2.39.*
  host:
  run:
    - sysroot_linux-64 2.39.*
    - zlib

test:
  commands:
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib64/libcrack.so.2
    - test -f ${PREFIX}/x86_64-conda_el10-linux-gnu/sysroot/usr/lib64/libcrack.so.2.9.0

about:
  home: https://github.com/cracklib/cracklib
  license: LGPL-2.1-only  # LGPL-2.1-or-later
  license_family: LGPL
  license_file:
    - COPYING.LIB
  summary: (CDT) A password-checking library
  description: |
    CrackLib tests passwords to determine whether they match certain
    security-oriented characteristics, with the purpose of stopping users
    from choosing passwords that are easy to guess. CrackLib performs
    several tests on passwords: it tries to generate words from a username
    and gecos entry and checks those words against the password; it checks
    for simplistic patterns in passwords; and it checks for the password
    in a dictionary.

    CrackLib is actually a library containing a particular C function
    which is used to check the password, as well as other C
    functions. CrackLib is not a replacement for a passwd program; it must
    be used in conjunction with an existing passwd program.

    Install the cracklib package if you need a program to check users'
    passwords to see if they are at least minimally secure. If you install
    CrackLib, you will also want to install the cracklib-dicts package.
  doc_url: https://github.com/cracklib/cracklib
  dev_url: https://github.com/cracklib/cracklib

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
